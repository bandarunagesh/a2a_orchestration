x-langfuse-env: &langfuse_env
  LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-your-public-key}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-your-secret-key}

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unify_plus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    command: ["falkordb-server", "--port", "6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password

  # langfuse:  # Commented out - using cloud Langfuse
  #   image: langfuse/langfuse:latest
  #   environment:
  #     <<: *langfuse_env
  #     DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@postgres:5432/langfuse}
  #     NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key}
  #     NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  #     CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
  #     CLICKHOUSE_MIGRATION_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
  #     CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
  #     CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
  #     CLICKHOUSE_DB: ${CLICKHOUSE_DB:-langfuse}
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     clickhouse:
  #       condition: service_started

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama_init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e
      until curl -s http://ollama:11434/api/tags >/dev/null; do
        echo "waiting for ollama..."
        sleep 1
      done
      ollama --host http://ollama:11434 pull llama3.2
    volumes:
      - ollama_data:/root/.ollama

  orchestrator_gateway:
    build:
      context: .
      dockerfile: orchestrator_gateway/Dockerfile
    ports:
      - "8001:8000"
    environment:
      LANGFUSE_HOST: https://cloud.langfuse.com
      LANGFUSE_PUBLIC_KEY: pk-lf-e4e86629-2c3b-4963-bf2e-3aaf4e01939c
      LANGFUSE_SECRET_KEY: sk-lf-5d3e278c-930d-4265-939d-84b7ef3cb8c6
      FALKORDB_HOST: falkordb
    depends_on:
      falkordb:
        condition: service_healthy

  startup_agent:
    build:
      context: .
      dockerfile: agents/startup/Dockerfile
    ports:
      - "8010:8000"
    environment:
      <<: *langfuse_env
      CHROMADB_HOST: chromadb
    depends_on:
      - chromadb

  conduct_agent:
    build:
      context: .
      dockerfile: agents/conduct/Dockerfile
    ports:
      - "8011:8000"
    environment:
      <<: *langfuse_env
      CHROMADB_HOST: chromadb
    depends_on:
      - chromadb

  closeout_agent:
