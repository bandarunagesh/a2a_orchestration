  mcp_tools:
    build:
      context: .
      dockerfile: mcp_tools/Dockerfile
    ports:
      - "8030:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=unify_plus
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - orchestrator_gateway

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  clickhouse_data: